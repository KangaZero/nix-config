schema = "https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json"
console_title = true
console_title_style = "template"
console_title_template = "{{ .Folder }}"
version = 1

[upgrade]
notice = true
interval = "168h"
auto = false
source = "cdn"

[[blocks]]
alignment = "left"
newline = true
type = "prompt"

[[blocks.segments]]
foreground = "#bd93f9"                               # PURPLE
style = "diamond"
template = " {{.Icon}} "
trailing_diamond = "<transparent,>\ue0b2</>"
type = "os"
[blocks.segments.options]
alpine = "\uf300"
arch = "\uf303"
centos = "\uf304"
debian = "\uf306"
elementary = "\uf309"
fedora = "\uf30a"
gentoo = "\uf30d"
linux = "\ue712"
macos = "\uf179 "
manjaro = "\uf312"
mint = "\uf30f"
nixos = "\uf313" # THE GOAT
opensuse = "\uf314"
raspbian = "\uf315"
ubuntu = "\uf31b "
windows = "\ue62a "

[[blocks.segments]]
background = "#bd93f9"                                                    # DARK_PURPLE
foreground = "#000000"
style = "diamond"
leading_diamond = "\ue0b2"
template = " \ue266 CPU: {{ round .PhysicalPercentUsed .Precision }}% | "
type = "sysinfo"

[[blocks.segments]]
background = "#bd93f9"                                                                                                                                           # DARK_PURPLE
foreground = "#000000"
style = "diamond"
template = "RAM: {{ (div ((sub .PhysicalTotalMemory .PhysicalAvailableMemory)|float64) 1073741824.0) }}/{{ (div .PhysicalTotalMemory 1073741824.0) }}GB \ue266 "
trailing_diamond = "<transparent,#bd93f9>\ue0b2</>"
type = "sysinfo"

[[blocks.segments]]
background = "#8b5cf6"            # BORDER_PURPLE
foreground = "#ffffff"
leading_diamond = "\ue0b2"
style = "diamond"
template = " {{ .FormattedMs }} "
trailing_diamond = "\ue0b0"
type = "executiontime"
[blocks.segments.options]
style = "roundrock"
threshold = 0

[[blocks]]
alignment = "right"
type = "prompt"

[[blocks.segments]]
background = "#bd93f9"                                                                                                                                                                                                                                                                                                                                # PURPLE
foreground = "#000000"
# leading_diamond = ""
style = "diamond"
template = " {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} \uf044 {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} \uf046 {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} \ueb4b {{ .StashCount }}{{ end }} "
trailing_diamond = "\ue0b0"
type = "git"
[blocks.segments.options]
branch_icon = "\ue725 "
fetch_status = true
fetch_upstream_icon = true

[[blocks]]
alignment = "left"
newline = true
type = "prompt"

[[blocks.segments]]
foreground = "#bd93f9"    # PURPLE
style = "plain"
template = "\u256d\u2500"
type = "text"

[[blocks.segments]]
foreground = "#bd93f9" # PURPLE
# To lazy to dynamically add my username
template = " KangaZero"
powerline_symbol = "\ue0b0"
style = "powerline"
type = "text"

[[blocks.segments]]
background = "#bd93f9"                              # PURPLE
foreground = "#000000"
leading_diamond = "\ue0b2"
style = "diamond"
template = " \uf489 {{ .Name }} "
trailing_diamond = "<transparent,#bd93f9>\ue0b2</>"
type = "shell"

[[blocks.segments]]
background = "#8b5cf6"                                         # BORDER_PURPLE
foreground = "#000000"
leading_diamond = "\ue0b2"
style = "diamond"
template = " \ue641 {{ .CurrentDate | date .Format }} \uf073 "
trailing_diamond = "\ue0b0"
type = "time"
[blocks.segments.options]
time_format = "3:04:05 PM | Monday"

[[blocks.segments]]
style = "diamond"
template = " \uf0e7 "
type = "root"
[blocks.segments.options]
root_icon = "\uf292 "

[[blocks.segments]]
background = "#bd93f9"                             # DARK_PURPLE
foreground = "#000000"
leading_diamond = "<transparent,#bd93f9>\ue0b0</>"
style = "diamond"
template = " \ue5ff {{ .Path }} "
# trailing_diamond = ""
type = "path"
[blocks.segments.options]
folder_icon = "\uf07b "
folder_separator_icon = " \uf061 "
home_icon = "\uf46d"
style = "agnoster_full"

[[blocks]]
alignment = "left"
newline = true
type = "prompt"

[[blocks.segments]]
foreground = "#8b5cf6"                                         # BORDER_PURPLE
foreground_templates = ["{{ if gt .Code 0 }}#ef5350{{ end }}"]
style = "plain"
template = "\u2570\u2500\ue285 鍵 "
type = "status"
[blocks.segments.options]
always_enabled = true

[transient_prompt]

background = "transparent"
foreground = "#bd93f9"
template = "\ue285 "
